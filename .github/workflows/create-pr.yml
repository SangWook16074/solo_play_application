name: Auto PR with Gemini

on:
  push:
    branches:
      - feature/**   # feature 브랜치로 push될 때 실행

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests

      - name: Get commit message and diff
        run: |
          echo "COMMITS=$(git log -1 --pretty=%B)" >> $GITHUB_ENV
          echo "DIFF=$(git diff origin/main...HEAD)" >> $GITHUB_ENV

      - name: Generate PR description with Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import os, requests, json

          GEMINI_API_KEY = os.getenv("GEMINI_API_KEY")
          commits = os.getenv("COMMITS")
          diff = os.getenv("DIFF")

          prompt = f"""
          You are a helpful assistant that generates GitHub Pull Request descriptions.

          Commit Message:
          {commits}

          Git Diff:
          {diff}

          Please generate:
          - A concise PR title
          - A detailed PR description
          """

          resp = requests.post(
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",
              headers={"Content-Type": "application/json"},
              params={"key": GEMINI_API_KEY},  # ✅ key 파라미터 방식
              json={"contents": [{"parts": [{"text": prompt}]}]}
          )

          print("DEBUG RESPONSE:", resp.text)  # ✅ 응답 전체 출력
          data = resp.json()
          if "candidates" not in data:
              raise RuntimeError(f"Gemini API Error: {data}")

          text = data["candidates"][0]["content"]["parts"][0]["text"]

          # Gemini 결과를 환경변수로 export
          lines = text.strip().split("\n", 1)
          title = lines[0].strip("# ").strip()
          body = lines[1] if len(lines) > 1 else ""

          with open(os.getenv("GITHUB_OUTPUT"), "a") as f:
              print(f"title={title}", file=f)
              print(f"body={body}", file=f)
          EOF

      - name: Create Pull Request
        run: |
          gh auth login --with-token <<< "${{ secrets.UPSTREAM_REPO_PAT }}"
          gh pr create \
            --title "${{ steps.gemini.outputs.title }}" \
            --body "${{ steps.gemini.outputs.body }}" \
            --base main \
            --head ${{ github.ref_name }}
