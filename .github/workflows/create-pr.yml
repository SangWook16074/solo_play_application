name: Create Pull Request

on:
  push:
    branches-ignore:
      - 'develop'
      - 'main'

permissions:
  pull-requests: write
  contents: write

jobs:
  create_pull_request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request with AI Summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e

          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number -q 'map(.number) | .[]')
          if [ -n "$EXISTING_PR" ]; then
            echo "A pull request for this branch already exists: #$EXISTING_PR"
            exit 0
          fi

          echo "Creating a new pull request with AI summary."

          git fetch origin develop
          DIFF=$(git diff origin/develop..."$BRANCH_NAME")

          if [ -z "$DIFF" ]; then
            echo "No changes to create a pull request."
            exit 0
          fi
          
          # AI Prompt를 여러 줄의 변수로 안전하게 생성합니다.
          LINE1="다음은 Pull Request의 코드 변경사항(diff)입니다. 이 변경사항을 분석해서 한국어로 전문적인 Pull Request 설명을 작성해주세요."
          LINE2="제목, 주요 변경사항 요약, 그리고 상세한 변경 내용 목록을 포함해야 합니다. 마크다운 형식으로 작성해주세요."
          LINE3="Diff:"
          LINE4="```diff"
          LINE5="$DIFF"
          LINE6="```"

          # printf 를 사용하여 여러 줄의 문자열을 안전하게 조합합니다.
          PROMPT_TEXT=$(printf "%s\n\n%s\n\n%s\n%s\n%s\n%s" "$LINE1" "$LINE2" "$LINE3" "$LINE4" "$LINE5" "$LINE6")

          JSON_PAYLOAD=$(jq -n --arg text "$PROMPT_TEXT" \
            '{ "contents": [ { "parts": [ { "text": $text } ] } ] }')

          AI_SUMMARY=$(curl -s -f -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" | jq -r '.candidates[0].content.parts[0].text') || echo "AI 요약 생성에 실패했습니다."

          PR_TITLE=$(echo "$AI_SUMMARY" | head -n 1 | sed 's/# //')
          PR_BODY=$(echo "$AI_SUMMARY" | tail -n +2)

          if [ -z "$PR_TITLE" ]; then
            PR_TITLE="Feat: $BRANCH_NAME"
          fi
          if [ -z "$PR_BODY" ]; then
            PR_BODY="AI 요약 생성에 실패했습니다. 수동으로 작성해주세요."
          fi

          gh pr create --base develop --title "$PR_TITLE" --body "$PR_BODY"
